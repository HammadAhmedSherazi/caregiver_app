# Keep heap modest: disk is often near-full and heap dumps can fail the build.
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# AGP 8.13+ needs JDK 17+. Use Android Studio's embedded JBR.
org.gradle.java.home=/Applications/Android Studio.app/Contents/jbr/Contents/Home
