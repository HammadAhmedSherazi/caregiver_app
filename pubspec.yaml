name: caregiver_app
description: Caregiver App - mobile-first Flutter application for Android and iOS.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^8.0.3
  flutter_svg: ^2.0.17
  shared_preferences: ^2.5.3
  dio: ^5.8.0+1
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  url_launcher: ^6.3.2
  skeletonizer: ^2.1.3
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  dart_pusher_channels: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/onboarding/
    - assets/images/auth/
    - assets/images/auth/icons/
    - assets/images/home/
    - assets/images/home/ic_avatar.png
    - assets/images/home/icons/
    - assets/images/schedule/
    - assets/images/schedule/icons/
    - assets/images/profile/
    - assets/images/profile/icons/
    - assets/images/task/
    - assets/images/task/icons/

  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Light.ttf
          weight: 300
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/DMSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/DMSans-Black.ttf
          weight: 900
        - asset: assets/fonts/DMSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/DMSans-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/DMSans-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/DMSans-BoldItalic.ttf
          weight: 700
          style: italic
